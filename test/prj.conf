# runtime-ble on-target test suite (ztest). Target: nRF54L15 hardware.
CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=4096

# --- runtime-ble (trouble + SoftDevice Controller, owns the radio) ---
CONFIG_RUNTIME_BLE=y
CONFIG_BT=n
# Allocate the per-session thread stack from the system heap too, so the leak
# check sees (and verifies the return of) the whole session footprint.
CONFIG_DYNAMIC_THREAD_PREFER_ALLOC=y
# Headroom for repeated load/unload cycles plus the measurement.
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=4096

# Heap free-byte accounting used by the stress (no-leak) test.
CONFIG_SYS_HEAP_RUNTIME_STATS=y

# --- console / logging ---
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_THREAD_NAME=y

# Print fault dumps to the console rather than silently resetting.
CONFIG_EXCEPTION_DEBUG=y
