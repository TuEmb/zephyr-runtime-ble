# Standalone west manifest for the runtime-ble "nrf52832" example.
#
# The example is independent of the library repo: it pulls Zephyr AND the
# zephyr-runtime-ble module via git, so it builds with NO -DZEPHYR_EXTRA_MODULES
# (west auto-discovers zephyr-runtime-ble as a module via its zephyr/module.yml).
#
#   west init -l nrf52832        # use this example as the manifest (it must be a git repo)
#   west update            # clones Zephyr + zephyr-runtime-ble
#   west build -b <board> nrf52832
manifest:
  remotes:
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos
    - name: tuemb
      url-base: https://github.com/TuEmb

  projects:
    # Not tied to a Zephyr version: the module uses only stable APIs + a prebuilt
    # staticlib (verified on 4.1.x-4.4.x). This is just the release this example
    # pins -- change it to whatever you build against.
    - name: zephyr
      remote: zephyrproject
      revision: v4.4.1
      import: true
    - name: zephyr-runtime-ble
      remote: tuemb
      revision: main
      path: modules/zephyr-runtime-ble

  self:
    path: nrf52832
