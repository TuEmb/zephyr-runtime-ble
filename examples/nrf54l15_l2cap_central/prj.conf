# runtime-ble L2CAP central example — nRF54L15.
CONFIG_RUNTIME_BLE=y
CONFIG_RUNTIME_BLE_CENTRAL=y
CONFIG_RUNTIME_BLE_L2CAP=y
CONFIG_BT=n
CONFIG_DYNAMIC_THREAD_PREFER_ALLOC=y
# central + l2cap runs more concurrent async work (host runner + GATT client +
# L2CAP pumps), so the runtime thread future is larger: give it more stack +
# heap headroom than the single-role examples.
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_RUNTIME_BLE_THREAD_STACK_SIZE=49152
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_THREAD_NAME=y
CONFIG_EXCEPTION_DEBUG=y
