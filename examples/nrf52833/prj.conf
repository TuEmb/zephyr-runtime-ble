# runtime-ble echo example — Seeed XIAO nRF54L15 / Nordic nRF54L15 DK.

# --- runtime-ble (trouble + SoftDevice Controller, owns the radio) ---
CONFIG_RUNTIME_BLE=y
# trouble owns the radio -> the Zephyr BT stack and MPSL must be off.
CONFIG_BT=n
# The module selects DYNAMIC_THREAD/_ALLOC; choose the stack-from-heap strategy.
CONFIG_DYNAMIC_THREAD_PREFER_ALLOC=y
# One session (~38 KB incl. the dynamic thread stack) is allocated on load.
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=2048

# --- console / logging ---
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_THREAD_NAME=y

# Print fault dumps to the console rather than silently resetting.
CONFIG_EXCEPTION_DEBUG=y

# nRF52 has an FPU; the prebuilt runtime-ble lib is hard-float (thumbv7em-none-eabihf).
CONFIG_FPU=y
CONFIG_FP_HARDABI=y
