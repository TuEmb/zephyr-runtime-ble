# runtime-ble DUAL (server + client) example — nRF54L15.
CONFIG_RUNTIME_BLE=y
# Dual needs the central-capable lib (it also raises CONNECTIONS_MAX to 2).
CONFIG_RUNTIME_BLE_CENTRAL=y
CONFIG_BT=n
CONFIG_DYNAMIC_THREAD_PREFER_ALLOC=y
# Dual runs the peripheral server AND the central client concurrently (two links,
# many async futures): give it the largest thread stack + a big heap.
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_RUNTIME_BLE_THREAD_STACK_SIZE=65536
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_THREAD_NAME=y
CONFIG_EXCEPTION_DEBUG=y
