# Standalone west manifest for the runtime-ble GATT-server (peripheral) example.
#
# Organized by feature, not by board — build it for any supported board with
# `west build -b <board> gatt_server` (board-specific tweaks live in boards/).
# It pulls Zephyr AND the zephyr-runtime-ble module via git (NO
# -DZEPHYR_EXTRA_MODULES; west auto-discovers the module via zephyr/module.yml).
#
#   west init -l gatt_server     # use this example as the manifest (a git repo)
#   west update                  # clones Zephyr + zephyr-runtime-ble
#   west build -b <board> gatt_server     # see the README board table
manifest:
  remotes:
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos
    - name: tuemb
      url-base: https://github.com/TuEmb

  projects:
    # Not tied to a Zephyr version: the module uses only stable APIs + a prebuilt
    # staticlib (verified on 4.1.x-4.4.x). This is just the release this example
    # pins -- change it to whatever you build against.
    - name: zephyr
      remote: zephyrproject
      revision: v4.4.1
      import: true
    - name: zephyr-runtime-ble
      remote: tuemb
      revision: main
      path: modules/zephyr-runtime-ble

  self:
    path: gatt_server
